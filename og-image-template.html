<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }
    .card {
      width: 200px;
      height: 280px;
      background: linear-gradient(145deg, #2a2a4a 0%, #1a1a3a 100%);
      border: 2px solid #9C27B0;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin-bottom: 40px;
      box-shadow: 0 20px 60px rgba(156, 39, 176, 0.2);
    }
    .card-symbol {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 14px;
      color: #9C27B0;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    h1 {
      font-size: 52px;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 16px;
    }
    h1 em { color: #9C27B0; font-style: normal; }
    p {
      font-size: 20px;
      color: #888;
      text-align: center;
    }
    .badge {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-size: 14px;
      color: #555;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-symbol">🃏</div>
    <div class="card-title">Butts Cards</div>
  </div>
  <h1>A Strategic <em>Card Game</em></h1>
  <p>Collect, trade, and compete in multiplayer battles</p>
  <div class="badge">cards.buttsstudios.com</div>
</body>
</html>
